<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Garage | CarTees</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/profile.css">

  <script src="js/script.js" defer></script>
  <script src="js/cart.js" defer></script>
</head>
<body>

  <header class="navbar">
    <div class="logo"><a href="home.html">Car<span>Tees</span></a></div>
    <nav class="nav-links">
      <a href="home.html">Home</a>
      <a href="shop.html">Shop All</a>
      <a href="profile.html" class="active">Profile</a>
    </nav>
  </header>

  <main class="profile-container">
    <aside class="profile-sidebar">
      <div class="user-info">
        <div class="profile-pic">👤</div>
        <h3 id="userNameDisplay">loading...</h3>
        <p id="userEmailDisplay">loading...</p>
      </div>
      <nav class="sidebar-menu">
        <a href="#details" class="menu-item active">My Details</a>
        <a href="#orders" class="menu-item">Order History</a>
        <a href="#settings" class="menu-item">Account Settings</a>
        <a href="javascript:void(0)" onclick="handleLogout()" class="menu-item logout">Logout</a>      </nav>
    </aside>

    <section class="profile-content">
      <div class="content-card">
        <h2>Account Details</h2>
        <form id="profileForm">
          <div class="form-row">
            <div class="form-group">
              <label>Full Name</label>
              <input type="text" id="inputName" value="">            
            </div>
            <div class="form-group">
              <label>Email Address</label>
              <input type="email" id="inputEmail" value="" disabled>            
            </div>
          </div>
          <div class="form-group">
            <label>Shipping Address</label>
            <textarea id="inputAddress" placeholder="123 Street, Cairo, Egypt"></textarea>          
          </div>
          <button type="submit" class="btn-primary">Save Changes</button>
        </form>
      </div>
    </section>
  </main>

  </body>
</html>
